<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perdaopqn - Painel Flutuante</title>
    
    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Extra+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- CSS do Painel -->
    <link rel="stylesheet" href="css/df-df.css">
    
    <!-- Wrapper só para teste isolado -->
    </head>
<body>
    <!-- Overlay -->
    <div id="overlay" class="df-overlay active" onclick="fecharPainel()"></div>
    <div class="df-fundo">
        <img src="assets/painel-capa-degrade.png" class="df-img-fundo">
    </div>
    <!-- Painel -->
    <div class="df-container">
        <div class="df-AA">
        <div class="df-AAA-toggle">
        <div class="df-AAA-left">Mande sua mensagem por aqui
        </div>
        <div class="df-AAA-right">Mande pelo <strong>GitHub</strong>
        </div>
        </div>
        <div class="df-AAA">Seu nome (opcional)</div>
        <div class="df-AAA">Seu e-mail (para resposta)</div>
        <div class="df-AAA-msg">Sua mensagem, dúvida ou testemunho</div>
        <div class="df-AAA">Clique aqui para enviar
        </div>
        </div>
    <div class="df-BB">
        <div class="df-BBB"><img src="assets/share-whatsapp.png" height="100%"></div>
        <div class="df-BBB"><img src="assets/share-facebook.png" height="100%"></div>
        <div class="df-BBB"><img src="assets/share-instagram.png" height="100%"></div>
        <div class="df-BBB"><img src="assets/share-link.png" height="100%"></div>
    </div>
    <div class="df-CC">
                    <img src="./assets/fale-com.png" alt="Fale com o autor">
                    <span class="df-texto-whats">Fale direto<br>com o autor</span>
                </div>
    <div class="df-DD" onclick="fecharPainel()">
        <span class="df-texto-voltar">Clique aqui para<p>-</p><strong>voltar à leitura</strong></span>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
