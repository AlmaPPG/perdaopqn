<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perdaopqn - div flut</title>
    
    <!-- Fontes Google (Links corrigidos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <div class="fundo">

            <div class="AA">

                <div class="AAA-Git">
                    <span class="texto-superior">Enviar mensagem no</span>
