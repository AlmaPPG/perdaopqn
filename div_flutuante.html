<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perdaopqn - div flut</title>
    
    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Extra+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- ✅ CSS do Painel -->
    <link rel="stylesheet" href="./css/div_flutuante.css">
</head>
<body>
    <div class="fundo">
        <img src="assets/painel-capa-degrade.png" class="img-fundo" alt="Fundo do painel">
        
        <div class="container">
            <!-- SEÇÃO AA: Toggles -->
            <div class="AA">
                <div class="AAA-Form" onclick="toggleFormulario()">
                    <span class="texto-superior">Enviar feedback</span>
                    <span class="texto-inferior">Feedback</span>
                </div>
                <div class="AAA-Git" onclick="toggleGithub()">
                    <span class="texto-superior">Enviar mensagem no</span>
                    <span class="texto-inferior">GitHub</span>
                </div>
            </div>
            
            <!-- SEÇÃO BB: Compartilhamento -->
            <div class="BB">
                <div class="BBB-1" onclick="compartilharWhatsApp()">
                    <img src="./assets/share-whatsapp.png" alt="WhatsApp">
                    <span class="texto-rede">WhatsApp</span>
                </div>
                <div class="BBB-2" onclick="compartilharInstagram()">
                    <img src="./assets/share-instagram.png" alt="Instagram">
                    <span class="texto-rede">Instagram</span>
                </div>
                <div class="BBB-3" onclick="compartilharFacebook()">
                    <img src="./assets/share-facebook.png" alt="Facebook">
                    <span class="texto-rede">Facebook</span>
                </div>
                <div class="BBB-4" onclick="copiarLink()">
                    <img src="./assets/share-link.png" alt="Copiar Link">
                    <span class="texto-rede">Copiar Link</span>
                </div>
            </div>
            
            <!-- SEÇÃO CC: Fale com o Autor -->
            <div class="CC">
                <img src="./assets/fale-com.png" alt="Fale com o autor">
                <span class="texto-whats">Fale direto<br>com o autor</span>
            </div>
            
            <!-- SEÇÃO DD: Voltar à Leitura -->
            <div class="DD" onclick="window.close()">
                <p>Clique aqui para <strong>voltar à leitura</strong></p>
            </div>

            <!-- ✅ CONTEÚDOS OCULTOS (Com IDs) -->
            <div id="conteudo-formulario" class="toggle-conteudo" style="display:none;">
                <input type="text" class="form-input" placeholder="Seu nome">
                <input type="email" class="form-input" placeholder="Seu email">
                <textarea class="form-input" placeholder="Sua mensagem" style="min-height:80px;"></textarea>
                <button class="btn-enviar" onclick="alert('Enviado!')">ENVIAR</button>
            </div>

            <div id="conteudo-github" class="toggle-conteudo" style="display:none;">
                <p style="color:#C6C76D; margin-bottom:10px;">Redirecionando para o GitHub...</p>
                <a href="https://github.com/AlmaPPG/perdaopqn" target="_blank" style="color:#fff;">Abrir Issues</a>
            </div>
        </div>
    </div>

    <!-- ✅ JS com todas as funções -->
    <script src="js/main.js"></script>
</body>
</html>
