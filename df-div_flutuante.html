<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perdaopqn - Painel Flutuante</title>
    
    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Extra+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- CSS do Painel -->
    <link rel="stylesheet" href="css/df-div_flutuante.css">
    
    <!-- Wrapper só para teste isolado -->
    <style>
        body {
            background-color: rgba(0, 0, 0, 0.7);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- Overlay -->
    <div id="overlay" class="df-overlay active" onclick="fecharPainel()"></div>
    
    <!-- Painel -->
    <div id="painelInteracao" class="df-painel-interacao active">
        <div class="df-fundo">
            <img src="assets/painel-capa-degrade.png" class="df-img-fundo" alt="Fundo do painel">
            
            <div class="df-container">
                <!-- Seção AA: Toggles -->
                <div class="df-AA">
                    <div class="df-AAA-Form" onclick="toggleFormulario()">
                        <span class="df-texto-superior">Enviar feedback</span>
                        <span class="df-texto-inferior">Feedback</span>
                    </div>
                    <div class="df-AAA-Git" onclick="toggleGithub()">
                        <span class="df-texto-superior">Enviar mensagem no</span>
                        <span class="df-texto-inferior">GitHub</span>
                    </div>
                </div>
                
                <!-- Seção BB: Compartilhamento -->
                <div class="df-BB">
                    <div class="df-BBB-1" onclick="compartilharWhatsApp()">
                        <img src="./assets/share-whatsapp.png" alt="WhatsApp">
                        <span class="df-texto-rede">WhatsApp</span>
                    </div>
                    <div class="df-BBB-2" onclick="compartilharInstagram()">
                        <img src="./assets/share-instagram.png" alt="Instagram">
                        <span class="df-texto-rede">Instagram</span>
                    </div>
                    <div class="df-BBB-3" onclick="compartilharFacebook()">
                        <img src="./assets/share-facebook.png" alt="Facebook">
                        <span class="df-texto-rede">Facebook</span>
                    </div>
                    <div class="df-BBB-4" onclick="copiarLink()">
                        <img src="./assets/share-link.png" alt="Copiar Link">
                        <span class="df-texto-rede">Copiar Link</span>
                    </div>
                </div>
                
                <!-- Seção CC: Fale com o Autor -->
                <div class="df-CC">
                    <img src="./assets/fale-com.png" alt="Fale com o autor">
                    <span class="df-texto-whats">Fale direto<br>com o autor</span>
                </div>
                
                <!-- Seção DD: Voltar à Leitura -->
                <div class="df-DD" onclick="fecharPainel()">
                    <p>Clique aqui para <strong>voltar à leitura</strong></p>
                </div>

                <!-- Conteúdos Ocultos -->
                <div id="conteudo-formulario" class="df-toggle-conteudo">
                    <input type="text" class="df-form-input" placeholder="Seu nome">
                    <input type="email" class="df-form-input" placeholder="Seu email">
                    <textarea class="df-form-input" placeholder="Sua mensagem" style="min-height:80px;"></textarea>
                    <button class="df-btn-enviar" onclick="event.stopPropagation(); alert('Enviado!')">ENVIAR</button>
                </div>

                <div id="conteudo-github" class="df-toggle-conteudo">
                    <p style="color:#C6C76D; margin-bottom:10px;">Redirecionando para o GitHub...</p>
                    <a href="https://github.com/AlmaPPG/perdaopqn" target="_blank" style="color:#fff;" onclick="event.stopPropagation();">Abrir Issues</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
